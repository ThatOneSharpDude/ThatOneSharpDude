<style>
text{font-family:ui-monospace,'Cascadia Code',Consolas,Menlo,'DejaVu Sans Mono',monospace;font-size:14px;fill:#c9d1d9}
.g{fill:#00ff9c}.b{fill:#00b4ff}.p{fill:#a87fff}.w{fill:#e6edf3}.d{fill:#8b949e}.k{fill:#525e70}
.bd{font-weight:bold}.s{font-size:12px}.t{font-size:11.5px}
.blink{animation:bl 1.12s steps(1,end) infinite}
@keyframes bl{0%,55%{opacity:1}56%,100%{opacity:0}}
.win{animation:pop .7s cubic-bezier(.2,.8,.25,1) both}
@keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.gl1{animation:pl1 9s ease-in-out infinite alternate}
.gl2{animation:pl1 11s ease-in-out -4s infinite alternate}
@keyframes pl1{from{opacity:.04}to{opacity:.09}}
.dot{animation:pu 2.2s ease-in-out infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.2}}
.fa{animation:fA 8s steps(1,end) infinite}
.fb{animation:fB 8s steps(1,end) infinite}
@keyframes fA{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes fB{0%,49%{opacity:0}50%,100%{opacity:1}}
</style>
