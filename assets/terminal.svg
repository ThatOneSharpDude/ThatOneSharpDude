<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 960 540" width="960" height="540" role="img" aria-label="Animated terminal session: fox boots his quant models, detects a +3.4% EV edge, locks the hedge and tails the model log">
<title>fox@edge :: live terminal session</title>
<defs>
<linearGradient id="scanG" x1="0" x2="0" y1="0" y2="1">
<stop offset="0" stop-color="#00ff9c" stop-opacity="0"/><stop offset=".5" stop-color="#00ff9c" stop-opacity=".05"/><stop offset="1" stop-color="#00ff9c" stop-opacity="0"/>
</linearGradient>
<linearGradient id="barG" x1="0" x2="1" y1="0" y2="0">
<stop offset="0" stop-color="#00b4ff"/><stop offset="1" stop-color="#00ff9c"/>
</linearGradient>
<filter id="soft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="46"/></filter>
<filter id="ds" x="-6%" y="-8%" width="112%" height="120%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity=".55"/></filter>
<pattern id="crt" width="3" height="3" patternUnits="userSpaceOnUse"><rect width="3" height="1" fill="#010409"/></pattern>
<clipPath id="win"><rect x="24" y="20" width="912" height="488" rx="12"/></clipPath>
<clipPath id="c1"><rect x="157" y="112" width="0" height="20"><animate attributeName="width" values="0;8;16;24;32;40;48" calcMode="discrete" begin="0.5s" dur="0.42s" fill="freeze"/></rect></clipPath>
<clipPath id="c2"><rect x="157" y="154" width="0" height="20"><animate attributeName="width" values="0;16;32;48;64;80;96;112;128;144;160;176;192;208;224;240;256;272;288;304" calcMode="discrete" begin="1.7s" dur="1s" fill="freeze"/></rect></clipPath>
<clipPath id="c3"><rect x="157" y="343" width="0" height="20"><animate attributeName="width" values="0;16;32;48;64;80;96;112;128;144;160;176;184" calcMode="discrete" begin="7.6s" dur="0.6s" fill="freeze"/></rect></clipPath>
<clipPath id="cd"><rect x="356" y="175" width="0" height="20"><animate attributeName="width" values="0;8;16;24;32;40;48;56;64;72;80" calcMode="discrete" begin="3s" dur="0.55s" fill="freeze"/></rect></clipPath>
<clipPath id="logw"><rect x="40" y="368" width="874" height="84"/></clipPath>
