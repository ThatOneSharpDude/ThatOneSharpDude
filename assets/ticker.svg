<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 960 128" width="960" height="128" role="img" aria-label="tmux status bar with a scrolling ticker of model prices, detected edges and locked hedges, then a typed prompt asks to explain the edge and the answer fades in: the house does not beat a man who does the math">
<title>fox@edge :: status line and sign-off</title>
<defs>
<clipPath id="tc"><rect x="124" y="9" width="642" height="38"/></clipPath>
<clipPath id="qc"><rect x="104" y="62" width="0" height="20"><animate attributeName="width" values="0;15;30;45;60;75;90;105;120" calcMode="discrete" begin="0.5s" dur="0.7s" fill="freeze"/></rect></clipPath>
<linearGradient id="fL" x1="0" x2="1" y1="0" y2="0"><stop offset="0" stop-color="#0a0d13"/><stop offset="1" stop-color="#0a0d13" stop-opacity="0"/></linearGradient>
<linearGradient id="fR" x1="0" x2="1" y1="0" y2="0"><stop offset="0" stop-color="#0a0d13" stop-opacity="0"/><stop offset="1" stop-color="#0a0d13"/></linearGradient>
<filter id="qglow" x="-20%" y="-80%" width="140%" height="260%"><feGaussianBlur stdDeviation="4"/></filter>
</defs>
<style>
text{font-family:ui-monospace,'Cascadia Code',Consolas,Menlo,'DejaVu Sans Mono',monospace;font-size:13px;fill:#8b949e}
.g{fill:#00ff9c}.b{fill:#00b4ff}.w{fill:#e6edf3}.k{fill:#525e70}.bd{font-weight:bold}
.dot{animation:pu 2.2s ease-in-out infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.2}}
.blink{animation:bl 1.12s steps(1,end) infinite}
@keyframes bl{0%,55%{opacity:1}56%,100%{opacity:0}}
</style>
<rect width="960" height="128" fill="#0d1117"/>
<rect x="0.5" y="8.5" width="959" height="39" rx="8" fill="#0a0d13" stroke="#1f2733"/>
<rect x="8" y="14" width="104" height="28" rx="5" fill="#00ff9c"/>
<text x="60" y="32" text-anchor="middle" class="bd" font-size="12.5" fill="#0d1117">fox@edge</text>
<g clip-path="url(#tc)">
<g transform="translate(124 0)">
<g>
<animateTransform attributeName="transform" type="translate" from="0 0" to="-1930 0" dur="44s" repeatCount="indefinite"/>
<text id="tk" x="16" y="33" textLength="1930" lengthAdjust="spacing"><tspan class="b bd">NHL</tspan><tspan class="w"> PIT ML </tspan><tspan class="b">+142</tspan><tspan class="k"> -&gt; </tspan><tspan>hedge @ 0.47 </tspan><tspan class="g">[ok]</tspan><tspan class="k"> :: </tspan><tspan class="b bd">NBA</tspan><tspan class="w"> BOS -3.5</tspan><tspan> clv </tspan><tspan class="g">+1.8% [ok]</tspan><tspan class="k"> :: </tspan><tspan class="b bd">MLB</tspan><tspan class="w"> NYY +105</tspan><tspan> model +92 </tspan><tspan class="k">pass</tspan><tspan class="k"> :: </tspan><tspan class="b bd">WC</tspan><tspan class="w"> ARG 2.10</tspan><tspan> model 1.88 edge </tspan><tspan class="g">+4.1% [ok]</tspan><tspan class="k"> :: </tspan><tspan class="w">mc 50k paths</tspan><tspan class="k"> :: </tspan><tspan class="w">kelly 0.25x</tspan><tspan class="k"> :: </tspan><tspan class="g">calibrated.</tspan><tspan class="b"> systematic.</tspan><tspan class="w"> relentless.</tspan><tspan class="k"> :: </tspan><tspan class="g">edge detected [ok]</tspan><tspan class="k"> :: </tspan><tspan class="g">hedge locked [ok]</tspan><tspan class="k"> :: </tspan></text>
<use href="#tk" xlink:href="#tk" x="1930"/>
</g>
</g>
<rect x="124" y="9" width="26" height="38" fill="url(#fL)"/>
<rect x="740" y="9" width="26" height="38" fill="url(#fR)"/>
</g>
<rect x="774" y="14" width="1" height="28" fill="#1f2733"/>
<circle cx="792" cy="28" r="4" fill="#00ff9c" class="dot"/>
<text x="804" y="32" font-size="11.5"><tspan class="g bd">LIVE</tspan><tspan class="k"> :: </tspan><tspan class="w">do the math</tspan></text>

<g opacity="0"><set attributeName="opacity" to="1" begin="0.3s"/>
<text x="10" y="77"><tspan class="g">fox@edge</tspan><tspan class="k">:</tspan><tspan class="b">~</tspan><tspan class="g">$</tspan></text></g>
<text x="104" y="77" class="w" textLength="120" lengthAdjust="spacing" clip-path="url(#qc)">explain the edge</text>
<g opacity="0"><set attributeName="opacity" to="1" begin="0.3s"/><set attributeName="opacity" to="0" begin="1.7s"/>
<rect x="104" y="64" width="8" height="15" fill="#00ff9c" opacity=".85"><animate attributeName="x" values="104;119;134;149;164;179;194;209;224" calcMode="discrete" begin="0.5s" dur="0.7s" fill="freeze"/></rect></g>

<g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.8s" begin="1.8s" fill="freeze"/>
<text x="270" y="112" class="g" font-size="15" textLength="420" lengthAdjust="spacing" filter="url(#qglow)" opacity=".55">"the house does not beat a man who does the math"</text>
<text x="270" y="112" class="g" font-size="15" textLength="420" lengthAdjust="spacing">"the house does not beat a man who does the math"</text>
<rect class="blink" x="698" y="99" width="9" height="16" fill="#00ff9c" opacity=".85"/>
</g>
</svg>
